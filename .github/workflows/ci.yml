name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build CI Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.ci
          push: false
          load: true
          tags: deployer-ci:latest
          cache-from: type=gha,scope=deployer-ci
          cache-to: type=gha,mode=max,scope=deployer-ci

      - name: Run CI checks
        run: docker run --rm -v /var/run/docker.sock:/var/run/docker.sock deployer-ci:latest

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: test-results
          path: test-results/
          retention-days: 30

      - name: Validate Docker image builds
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          cache-from: type=gha,scope=deployer-production
          cache-to: type=gha,mode=max,scope=deployer-production

      - name: Metadata for Docker image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/deployer
          tags: |
            type=sha,prefix=,length=7
            type=raw,value=latest

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=deployer-production
          cache-to: type=gha,mode=max,scope=deployer-production
